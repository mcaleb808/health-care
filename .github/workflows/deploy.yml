name: Deploy Health Care App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Bootstrap Terraform backend
        run: |
          chmod +x scripts/bootstrap.sh
          ./scripts/bootstrap.sh
        env:
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Terraform Init & Create ECR
        working-directory: ./terraform
        env:
          TF_VAR_project_name: health-care
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
        run: |
          AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          AWS_REGION="${{ secrets.DEFAULT_AWS_REGION }}"

          terraform init -input=false \
            -backend-config="bucket=health-care-terraform-state-${AWS_ACCOUNT_ID}" \
            -backend-config="key=${TF_VAR_environment}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=health-care-terraform-locks" \
            -backend-config="encrypt=true"

          if ! terraform workspace list | grep -q "${TF_VAR_environment}"; then
            terraform workspace new "${TF_VAR_environment}"
          else
            terraform workspace select "${TF_VAR_environment}"
          fi

          terraform apply \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_lifecycle_policy.app \
            -auto-approve

      - name: Build and push Docker image
        env:
          CLERK_PK: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          ECR_URL=$(cd terraform && terraform output -raw ecr_repository_url)
          IMAGE_TAG="${{ github.sha }}"

          docker build \
            --build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${CLERK_PK}" \
            -t "${ECR_URL}:${IMAGE_TAG}" \
            -t "${ECR_URL}:latest" \
            .

          docker push "${ECR_URL}:${IMAGE_TAG}"
          docker push "${ECR_URL}:latest"

      - name: Terraform Apply - Full Infrastructure
        working-directory: ./terraform
        env:
          TF_VAR_project_name: health-care
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_clerk_publishable_key: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
        run: |
          terraform apply -auto-approve

      - name: Deployment Summary
        working-directory: ./terraform
        run: |
          APP_URL=$(terraform output -raw app_runner_url)
          echo "Deployment Complete!"
          echo "App URL: $APP_URL"
          echo "Image: ${{ github.sha }}"
